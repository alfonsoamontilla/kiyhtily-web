<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
    content="width=device-width, 
    initial-scale=1.0">
  <title>kiyhtily — Know in your 
    heart that I love you</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #07090D;
      color: #EDF0F8;
      font-family: -apple-system,
        BlinkMacSystemFont,
        'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo {
      font-size: 52px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .accent {
      color: #00E5A0;
    }
    .tagline {
      font-size: 18px;
      color: #8490A8;
      margin-bottom: 8px;
      font-style: italic;
    }
    .sub {
      font-size: 14px;
      color: #505870;
      margin-bottom: 40px;
      max-width: 360px;
      line-height: 1.6;
    }
    .coming-soon {
      display: inline-block;
      background: rgba(0,229,160,0.1);
      border: 1px solid 
        rgba(0,229,160,0.3);
      color: #00E5A0;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 20px;
      margin-bottom: 40px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .email-wrap {
      display: flex;
      gap: 8px;
      max-width: 360px;
      width: 100%;
      margin-bottom: 32px;
    }
    .email-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid 
        rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      color: #EDF0F8;
      outline: none;
    }
    .email-input::placeholder {
      color: #505870;
    }
    .notify-btn {
      padding: 12px 20px;
      background: #00E5A0;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .footer {
      font-size: 12px;
      color: #505870;
      margin-top: 48px;
    }
    .footer a {
      color: #505870;
      text-decoration: none;
      margin: 0 8px;
    }
    .footer a:hover {
      color: #8490A8;
    }
    .platforms {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .platform-badge {
      background: rgba(255,255,255,0.06);
      border: 1px solid 
        rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      color: #8490A8;
    }
  </style>
</head>
<body>

  <div class="logo">💡</div>
  
  <h1>
    <span class="accent">kiyhtily</span>
  </h1>
  
  <div class="tagline">
    Know in your heart that I love you
  </div>
  
  <div class="sub">
    Your AI co-pilot for every financial 
    decision. Built for the people 
    you love.
  </div>

  <div class="coming-soon">
    Coming Soon
  </div>

  <div class="email-wrap">
    <input 
      class="email-input"
      type="email"
      placeholder="your@email.com"
    />
    <button class="notify-btn">
      Notify me
    </button>
  </div>

  <div class="platforms">
    <div class="platform-badge">
      🍎 iOS
    </div>
    <div class="platform-badge">
      🤖 Android
    </div>
  </div>

  <div class="footer">
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <a href="mailto:support@kiyhtily.com">
      Contact
    </a>
    <br><br>
    © 2026 kiyhtily. 
    All rights reserved.
  </div>

</body>
</html>
